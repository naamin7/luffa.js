<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvesTrack - Connect Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    .connect-btn {
      width: 100%;
      padding: 0.875rem 1.5rem;
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .connect-btn:hover { background: #7c3aed; }
    .connect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: #555;
      font-size: 0.75rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #333;
    }

    .manual-input {
      display: flex;
      gap: 0.5rem;
    }

    .manual-input input {
      flex: 1;
      padding: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.875rem;
      font-family: monospace;
    }

    .manual-input input:focus {
      outline: none;
      border-color: #6d28d9;
    }

    .manual-input button {
      padding: 0.75rem 1rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 0.875rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .manual-input button:hover { border-color: #6d28d9; }

    .status {
      margin-top: 1.5rem;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }

    .status.success {
      display: block;
      background: #052e16;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .status.error {
      display: block;
      background: #2a0a0a;
      color: #f87171;
      border: 1px solid #991b1b;
    }

    .status.info {
      display: block;
      background: #0c1929;
      color: #60a5fa;
      border: 1px solid #1e40af;
    }

    .address-display {
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      color: #888;
      word-break: break-all;
    }

    .tip {
      margin-top: 2rem;
      padding: 1rem;
      background: #111;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>InvesTrack</h1>
    <p class="subtitle">Link your wallet or paste an address to get started</p>

    <button class="connect-btn" id="connectBtn" onclick="connectWallet()">
      Connect with WalletConnect
    </button>

    <div class="divider">or paste your address</div>

    <div class="manual-input">
      <input
        type="text"
        id="addressInput"
        placeholder="0x..."
        spellcheck="false"
        autocomplete="off"
      />
      <button onclick="submitManual()">Link</button>
    </div>

    <div class="status" id="status"></div>
    <div class="address-display" id="addressDisplay"></div>

    <div class="tip">
      You can also skip this step entirely. Just message the bot with
      "add" followed by a token name (e.g. "add PEPE") to start tracking
      tokens without connecting a wallet.
    </div>
  </div>

  <script type="module">
    import { createWeb3Modal, defaultConfig } from "https://esm.sh/@web3modal/ethers@5.1.11";

    const params = new URLSearchParams(window.location.search);
    const USER_ID = params.get("user_id") || "wallet_user_" + Date.now();

    let projectId = "";
    let modal = null;

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + type;
    }

    async function linkWallet(address) {
      const resp = await fetch("/api/link-wallet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: USER_ID, address: address }),
      });

      const data = await resp.json();

      if (data.success) {
        document.getElementById("addressDisplay").textContent =
          "Linked: " + address;
        showStatus(
          "Wallet linked successfully. You can return to the chat.",
          "success"
        );
      } else {
        showStatus(data.error || "Failed to link wallet", "error");
      }
    }

    async function initModal() {
      try {
        const cfg = await fetch("/api/config").then((r) => r.json());
        projectId = cfg.walletconnect_project_id;

        if (!projectId) {
          console.log("No WalletConnect project ID configured");
          return;
        }

        const metadata = {
          name: "InvesTrack",
          description: "AI Crypto Portfolio Assistant",
          url: window.location.origin,
          icons: [],
        };

        const ethersConfig = defaultConfig({ metadata });

        modal = createWeb3Modal({
          ethersConfig,
          chains: [
            {
              chainId: 1,
              name: "Ethereum",
              currency: "ETH",
              explorerUrl: "https://etherscan.io",
              rpcUrl: "https://eth.llamarpc.com",
            },
          ],
          projectId,
          enableAnalytics: false,
          themeMode: "dark",
        });

        modal.subscribeProvider(({ address, isConnected }) => {
          if (isConnected && address) {
            linkWallet(address);
          }
        });
      } catch (err) {
        console.error("Failed to init Web3Modal:", err);
      }
    }

    window.connectWallet = async function () {
      const btn = document.getElementById("connectBtn");

      if (!modal) {
        // Fallback: if Web3Modal failed to init, prompt manual entry
        showStatus(
          "WalletConnect is not available. Please paste your wallet address below.",
          "info"
        );
        document.getElementById("addressInput").focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = "Connecting...";

      try {
        await modal.open();
      } catch (err) {
        showStatus("Connection failed. Try pasting your address instead.", "error");
        console.error(err);
      }

      btn.disabled = false;
      btn.textContent = "Connect with WalletConnect";
    };

    window.submitManual = function () {
      const input = document.getElementById("addressInput");
      const address = input.value.trim();

      if (!address) return;

      const pattern = /^0x[a-fA-F0-9]{40}$/;
      if (!pattern.test(address)) {
        showStatus("Invalid Ethereum address format", "error");
        return;
      }

      linkWallet(address);
    };

    document
      .getElementById("addressInput")
      .addEventListener("keydown", function (e) {
        if (e.key === "Enter") window.submitManual();
      });

    initModal();
  </script>
</body>
</html>
